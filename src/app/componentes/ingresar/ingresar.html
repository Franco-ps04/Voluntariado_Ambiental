  <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 w-100" style="max-width:440px">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="bg-success text-white rounded-3 d-inline-flex p-3 mb-3 shadow-sm">
        <i class="bi bi-leaf-fill fs-3"></i>
      </div>
      <h4 class="fw-bold mb-1">Bienvenido de vuelta</h4>
      <p class="text-muted small">Ingresa a tu cuenta GreenUnity</p>
    </div>

    <!-- <div class="text-center text-muted small mb-3">— o con tu correo —</div> -->

    @if (error) {
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    }

    <div class="mb-3">
      <label class="form-label small fw-semibold">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
        <input class="form-control" [(ngModel)]="email" placeholder="tu@gmail.com">
      </div>
    </div>

    <div class="mb-4">
      <div class="d-flex justify-content-between mb-1">
        <label class="form-label small fw-semibold mb-0">Contraseña</label>
        <a href="#" class="text-success small">¿Olvidaste tu contraseña?</a>
      </div>
      <div class="input-group">
        <span class="input-group-text bg-light"><i class="bi bi-lock text-muted"></i></span>
        <input [type]="showPass ? 'text' : 'password'" class="form-control" [(ngModel)]="password"
          placeholder="········">
        <span class="input-group-text bg-light cursor-pointer" (click)="showPass=!showPass">
          <i class="bi" [class.bi-eye]="!showPass" [class.bi-eye-slash]="showPass"></i>
        </span>
      </div>
    </div>

    <button class="btn btn-success w-100 py-2 fw-semibold mb-3" (click)="submit()" [disabled]="loading">
      @if(loading){
      <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
      }@else{
      Ingresar
      }
    </button>

    <p class="text-center small text-muted mb-4">
      ¿No tienes cuenta?
      <a routerLink="/registrarse" class="text-success fw-semibold">Regístrate gratis</a>
    </p>
  </div>
</div>
