<div class="card h-100 shadow-sm border-0 rounded-4 gu-event-card overflow-hidden"
  [style.outline]="selected ? '2px solid #2d9e5f' : 'none'" (click)="abrirEvento.emit(event)">

  <!-- Imagen clickeable → abre modal info -->
  <div style="position:relative;cursor:pointer;overflow:hidden" (click)="verInfo.emit(event)">
    <img [src]="getImageUrl()" [alt]="event.title" class="card-img-top"
      style="height:170px;object-fit:cover;transition:transform .2s" onmouseover="this.style.transform='scale(1.03)'"
      onmouseout="this.style.transform='scale(1)'">

    <!-- Overlay hover -->
    <div style="position:absolute;inset:0;background:rgba(0,0,0,.25);
                opacity:0;transition:opacity .2s;display:flex;align-items:center;
                justify-content:center" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'">
      <span style="background:rgba(255,255,255,.9);color:#111;border-radius:20px;
                   padding:4px 14px;font-size:12px;font-weight:600">
        <i class="bi bi-info-circle me-1"></i>Ver información
      </span>
    </div>
  </div>

  <div class="card-body p-3 d-flex flex-column">
    <span class="badge rounded-pill align-self-start mb-2 px-3 py-1" [class]="badgeClass()">
      {{ event.type }}
    </span>

    <h6 class="fw-bold mb-1 lh-sm">{{ event.title }}</h6>

    <p class="text-muted small mb-1">
      <i class="bi bi-calendar-event me-1"></i>
      Fecha: {{ event.date }} &nbsp; Hora: {{ event.time }}
    </p>
    <p class="text-muted small mb-2">
      <i class="bi bi-geo-alt me-1"></i>Lugar: {{ event.location }}
    </p>

    <!-- Cupos -->
    <div class="d-flex justify-content-between small text-muted mb-1">
      <span>Inscritos: <strong>{{ event.enrolledCount }}</strong></span>
      <span>Cupos disponibles: <strong>{{ cuposLibres() }}</strong></span>
    </div>
    <div class="progress mb-3" style="height:3px;border-radius:99px">
      <div class="progress-bar bg-success" [style.width]="pctOcupado() + '%'"></div>
    </div>

    <!-- Botones: Ver mapa | Información | Inscribirse -->
    <div class="d-flex gap-1 mt-auto">
      <button class="btn btn-outline-secondary btn-sm flex-fill" style="font-size:11px"
        (click)="verMapa.emit(event); $event.stopPropagation()">
        <i class="bi bi-map me-1"></i>Ver mapa
      </button>
      <button class="btn btn-outline-success btn-sm flex-fill" style="font-size:11px"
        (click)="verInfo.emit(event); $event.stopPropagation()">
        <i class="bi bi-info-circle me-1"></i>Información
      </button>
      @if (canEnroll) {
      <button class="btn btn-success btn-sm flex-fill" style="font-size:11px" [disabled]="inscrito"
        (click)="!inscrito && inscribirse.emit(event); $event.stopPropagation()">
        @if (inscrito) {
        <i class="bi bi-check-circle me-1"></i>Inscrito
        } @else {
        <i class="bi bi-person-plus me-1"></i>Inscribirse
        }
      </button>
      } @else {
      <button class="btn btn-outline-secondary btn-sm flex-fill" style="font-size:11px" disabled>
        <i class="bi bi-shield-lock me-1"></i>Voluntario
      </button>
      }
    </div>
  </div>
</div>
