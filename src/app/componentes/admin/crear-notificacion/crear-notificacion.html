<div class="container py-4" style="max-width: 780px;">
    <div class="mb-4">
        <h2 class="fw-bold mb-0">Crear notificación</h2>
        <p class="text-muted mb-0">Completa el formulario para publicar el mensaje</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label">Título del mensaje</label>
                <input class="form-control" [(ngModel)]="title">
            </div>

            <div class="mb-3">
                <label class="form-label">Público objetivo</label>
                <select class="form-select" [(ngModel)]="audience">
                    <option>Todos</option>
                    <option>Voluntarios inscritos</option>
                    <option>Voluntarios por tipo</option>
                    <option>Organizadores</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje (máximo 500 palabras)</label>
                <textarea class="form-control" rows="6" [(ngModel)]="message"></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button class="btn btn-outline-secondary" routerLink="/admin/dashboard">Cancelar</button>
                <button class="btn btn-success" (click)="submit()">Enviar notificación</button>
            </div>
        </div>
    </div>
</div>
