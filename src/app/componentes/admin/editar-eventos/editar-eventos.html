<div class="container py-4" style="max-width: 980px;" *ngIf="event">
    <div class="mb-4">
        <h2 class="fw-bold mb-0">Editar evento</h2>
        <p class="text-muted mb-0">Completa el formulario para publicar el evento editado</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Título del evento</label>
                    <input class="form-control" [(ngModel)]="event.title">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Tipo de actividad</label>
                    <input class="form-control" [(ngModel)]="event.type">
                </div>

                <div class="col-12">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" rows="4" [(ngModel)]="event.description"></textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Fecha</label>
                    <input class="form-control" [(ngModel)]="event.date">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Hora</label>
                    <input class="form-control" [(ngModel)]="event.time">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Máx. voluntarios</label>
                    <input type="number" class="form-control" [(ngModel)]="event.maxVolunteers">
                </div>

                <div class="col-12">
                    <label class="form-label">Ubicación (Texto)</label>
                    <input class="form-control" [(ngModel)]="event.location">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Latitud</label>
                    <input class="form-control" type="number" [(ngModel)]="event.latitude">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Longitud</label>
                    <input class="form-control" type="number" [(ngModel)]="event.longitude">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Organizador / ONG</label>
                    <input class="form-control" [(ngModel)]="event.organizer">
                </div>

                <div class="col-md-6">
                    <label class="form-label">URL de imagen</label>
                    <input class="form-control" [(ngModel)]="event.image">
                </div>

                <div class="col-12">
                    <label class="form-label">Requisitos (uno por línea)</label>
                    <textarea class="form-control" rows="4" [(ngModel)]="requirementsText"></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2">
                    <button class="btn btn-outline-secondary" routerLink="/admin/events">Cancelar</button>
                    <button class="btn btn-success" (click)="submit()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>
</div>
